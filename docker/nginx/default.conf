server {
    listen 80;
    server_name _;

    # Prevents nginx from generating absolute redirects with the internal port (80)
    # when accessed through a different public port (e.g. 8080 via Docker port mapping).
    absolute_redirect off;

    # ── Project root is /var/www (practical-A / kratik template) ─────
    # Frontend index.php lives at /var/www/index.php (not frontend/web/)
    # Backend index.php lives at /var/www/backend/index.php
    root /var/www;
    index index.php;

    # ── Block sensitive files ─────────────────────────────────────────
    location ~ /\.(ht|svn|git|env|DS_Store) {
        deny all;
    }

    location ~* \.(bak|bat|config|sql|fla|md|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
    }

    # ── Backend (/backend/) ───────────────────────────────────────────
    location ^~ /backend/ {
        try_files $uri $uri/ /backend/index.php$is_args$args;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass 127.0.0.1:9000;
            try_files $uri =404;
        }
    }

    # Redirect bare /backend → /backend/
    location = /backend {
        return 301 /backend/;
    }

    # ── Frontend (/) ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        try_files $uri =404;
    }
}
